<section class="min-h-screen text-slate-200 py-25" *ngIf="project; else notFound">
    <div class="max-w-7xl rounded-2xl mx-auto space-y-12 p-10 bg-slate-900">

        <!-- Header -->
        <div class="space-y-4">

            <h1 class="text-4xl md:text-6xl font-bold text-white tracking-tight">
                {{ project.title }}
            </h1>
        </div>


        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8 lg:gap-12">



            <div class="lg:col-span-2 space-y-12">

                <div
                    class="relative group rounded-2xl overflow-hidden shadow-2xl border border-slate-800 bg-slate-800 aspect-video">


                    <div class="relative w-full h-full">
                        <img *ngFor="let img of project.images; let i = index" [src]="img"
                            [alt]="project.title + ' screenshot ' + (i + 1)"
                            class="absolute inset-0 w-full h-full object-contain transition-opacity duration-500 ease-in-out"
                            [class.opacity-100]="i === currentSlide" [class.opacity-0]="i !== currentSlide">
                    </div>

                    <!-- Prev -->
                    <button (click)="prevSlide()"
                        class="absolute left-4 top-1/2 -translate-y-1/2 p-2 rounded-full bg-black/50 text-white hover:bg-indigo-600 transition-colors backdrop-blur-sm opacity-0 group-hover:opacity-100 focus:opacity-100">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24"
                            stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
                        </svg>
                    </button>

                    <!-- Next -->
                    <button (click)="nextSlide()"
                        class="absolute right-4 top-1/2 -translate-y-1/2 p-2 rounded-full bg-black/50 text-white hover:bg-indigo-600 transition-colors backdrop-blur-sm opacity-0 group-hover:opacity-100 focus:opacity-100">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24"
                            stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" />
                        </svg>
                    </button>


                    <div class="absolute bottom-4 left-1/2 -translate-x-1/2 flex space-x-2">
                        <button *ngFor="let img of project.images; let i = index" (click)="setSlide(i)"
                            class="w-2.5 h-2.5 rounded-full transition-all duration-300"
                            [class.bg-white]="i === currentSlide" [class.w-6]="i === currentSlide"
                            [class.bg-white/50]="i !== currentSlide">
                        </button>
                    </div>
                </div>


                <div class="space-y-6">
                    <h2 class="text-2xl font-semibold text-white border-l-4 border-indigo-500 pl-4">
                        Sobre o Projeto
                    </h2>

                    <p class="text-lg text-slate-300 leading-relaxed whitespace-pre-line">
                        {{ project.description }}
                    </p>
                </div>

            </div>


            <div class="space-y-6">

                <h3 class="text-2xl font-semibold text-white border-l-4 border-indigo-500 pl-4">
                    Tech Stack
                </h3>

                <div class="flex flex-wrap gap-3">
                    <div *ngFor="let tech of project.techStack"
                        class="flex items-center space-x-2 bg-slate-700/50 hover:bg-slate-700 px-4 py-2 rounded-lg border border-slate-600 transition-colors cursor-default">
                        <img [src]="tech.icon" [alt]="tech.name" class="w-6 h-6 object-contain">
                        <span class="font-medium text-slate-200">
                            {{ tech.name }}
                        </span>
                    </div>
                </div>


                <a *ngIf="project.githubLink" [href]="project.githubLink" target="_blank" class="flex items-center justify-center w-full px-6 py-4 bg-indigo-600 hover:bg-indigo-700
                 text-white font-semibold rounded-xl shadow-lg shadow-indigo-500/20 transition-all
                 duration-300 transform hover:-translate-y-1 group">

                    <svg class="w-6 h-6 mr-3" fill="currentColor" viewBox="0 0 24 24">
                        <path fill-rule="evenodd" d="M12 2C6.477 2 2 6.484 2 12.017c0 4.425 2.865 8.18 6.839 9.504.5.092.682-.217.682-.483 
                 0 -.237 -.008 -.868 -.013 -1.703 -2.782 .605 -3.369 -1.343 -3.369 -1.343 
                 -.454 -1.158 -1.11 -1.466 -1.11 -1.466 
                 -.908 -.62 .069 -.608 .069 -.608 
                 1.003 .07 1.531 1.032 1.531 1.032 
                 .892 1.53 2.341 1.088 2.91 .832 
                 .092 -.647 .35 -1.088 .636 -1.338 
                 -2.22 -.253 -4.555 -1.113 -4.555 -4.951 
                 0 -1.093 .39 -1.988 1.029 -2.688 
                 -.103 -.253 -.446 -1.272 .098 -2.65 
                 0 0 .84 -.27 2.75 1.026 
                 A9.564 9.564 0 0112 6.844 
                 c .85 .004 1.705 .115 2.504 .337 
                 1.909 -1.296 2.747 -1.027 2.747 -1.027 
                 .546 1.379 .202 2.398 .1 2.651 
                 .64 .7 1.028 1.595 1.028 2.688 
                 0 3.848 -2.339 4.695 -4.566 4.943 
                 .359 .309 .678 .92 .678 1.855 
                 0 1.338 -.012 2.419 -.012 2.747 
                 0 .268 .18 .58 .688 .482 
                 A10.019 10.019 0 0022 12.017C22 6.484 17.522 2 12 2z" clip-rule="evenodd" />
                    </svg>

                    Ver no GitHub

                    <svg xmlns="http://www.w3.org/2000/svg"
                        class="h-4 w-4 ml-2 opacity-70 group-hover:translate-x-1 transition-transform" fill="none"
                        viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M14 5l7 7m0 0l-7 7m7-7H3" />
                    </svg>
                </a>
            </div>

        </div>
    </div>
</section>

<ng-template #notFound>
    <div class="min-h-screen bg-slate-900 flex flex-col items-center justify-center text-slate-300">
        <h2 class="text-3xl font-bold text-white mb-4">
            Projeto não encontrado
        </h2>

        <p class="mb-8">
            O projeto que você está procurando não existe ou foi removido.
        </p>

        <a routerLink="/" class="px-6 py-3 bg-indigo-600 hover:bg-indigo-700 text-white rounded-lg transition-colors">
            Voltar para Home
        </a>
    </div>
</ng-template>
