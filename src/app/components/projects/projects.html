<div class="relative max-w-6xl mx-auto overflow-hidden py-16" id="projects">
    <h2
        class="text-4xl font-bold mb-12 text-center bg-linear-to-r from-white to-gray-400 bg-clip-text text-transparent">
        Meus Projetos
    </h2>


    <button (click)="prev()" [class.opacity-50]="currentIndex === 0" [disabled]="currentIndex === 0"
        class="absolute left-4 top-1/2 -translate-y-1/2 z-20 p-3 rounded-full bg-white/10 hover:bg-white/20 backdrop-blur-md text-white transition-all duration-300 border border-white/10">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"
            class="w-6 h-6">
            <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 19.5L8.25 12l7.5-7.5" />
        </svg>
    </button>

    <button (click)="next()" [class.opacity-50]="currentIndex === projects.length - 1"
        [disabled]="currentIndex === projects.length - 1"
        class="absolute right-4 top-1/2 -translate-y-1/2 z-20 p-3 rounded-full bg-white/10 hover:bg-white/20 backdrop-blur-md text-white transition-all duration-300 border border-white/10">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"
            class="w-6 h-6">
            <path stroke-linecap="round" stroke-linejoin="round" d="M8.25 4.5l7.5 7.5-7.5 7.5" />
        </svg>
    </button>


    <div class="flex gap-8 transition-transform duration-500 ease-out will-change-transform"
        [style.transform]="transformStyle">

        <div *ngFor="let project of projects; let i = index" (click)="setIndex(i)"
            class="flex-none w-[300px] bg-white/5 border border-white/10 rounded-2xl overflow-hidden backdrop-blur-md transition-all duration-500 cursor-pointer"
            [class.scale-110]="i === currentIndex" [class.z-10]="i === currentIndex"
            [class.opacity-100]="i === currentIndex" [class.scale-90]="i !== currentIndex"
            [class.opacity-50]="i !== currentIndex" [class.blur-[2px]]="i !== currentIndex"
            [class.shadow-2xl]="i === currentIndex" [class.border-white-20]="i === currentIndex">

            <div class="w-full h-[180px] overflow-hidden">
                <img [src]="project.image" [alt]="project.title"
                    class="w-full h-full object-cover transition-transform duration-500"
                    [class.scale-105]="i === currentIndex">
            </div>

            <div class="p-6 flex flex-col gap-4">
                <h3 class="text-xl font-semibold text-white m-0">{{ project.title }}</h3>
                <p class="text-sm text-white/70 leading-relaxed line-clamp-3 m-0">
                    {{ project.description }}
                </p>
                <a [href]="`/project/${project.id}`"
                    class="inline-block px-6 py-3 bg-linear-to-br from-indigo-500 to-violet-600 text-white rounded-lg font-medium text-center mt-auto transition-opacity hover:opacity-90"
                    target="_blank" (click)="$event.stopPropagation()">
                    Visualizar
                </a>
            </div>
        </div>
    </div>
</div>
